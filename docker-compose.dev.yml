
services:
  # PostgreSQL 数据库服务
  postgres:
    image: pgvector/pgvector:pg16
    command: postgres -c "log_statement=none" -c "log_min_messages=error" -c "log_min_error_statement=error"
    container_name: catwiki-postgres-dev
    env_file:
      - ./backend/.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      LANG: C.UTF-8
    ports:
      # 使用 5433 端口避免与本地 PostgreSQL 冲突
      # 如果需要使用 5432，请先停止本地 PostgreSQL 服务
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - catwiki-network
    # 资源限制（可选，防止数据库占用过多资源）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # RustFS 对象存储服务
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.76
    container_name: catwiki-rustfs-dev
    env_file:
      - ./backend/.env
    environment:
      # 时区设置
      - TZ=Asia/Shanghai
      # RustFS 配置 (从 .env 加载)
    ports:
      # RustFS API 端口
      - "9000:9000"
      # RustFS Console 端口
      - "9001:9001"
    volumes:
      # RustFS 数据存储（使用命名卷避免权限问题）
      - rustfs_data:/data
      # RustFS 日志
      - rustfs_logs:/logs
      # 时区配置（Linux only，Windows/Mac 会自动忽略）
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - catwiki-network
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # 后端初始化服务（只在首次启动或手动触发时运行）
  # 负责：
  # 1. 运行数据库迁移（alembic upgrade head）
  # 2. 创建初始管理员用户（admin@example.com / admin123）
  # 3. 创建 Demo 站点（医学科普）和初始化医学知识文档
  # 4. 初始化 RustFS 对象存储
  backend-init:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: catwiki-backend-init-dev
    container_name: catwiki-backend-init
    env_file:
      - ./backend/.env
    environment:
      # 环境配置
      TZ: Asia/Shanghai
      
      # 数据库配置（使用服务名连接）
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      
      # RustFS 对象存储配置 (从 .env 加载，Docker 内部通信使用 RUSTFS_DOCKER_ENDPOINT)
      RUSTFS_ENDPOINT: ${RUSTFS_DOCKER_ENDPOINT:-rustfs:9000}
      UV_CACHE_DIR: /root/.cache/uv
      
    volumes:
      # 挂载代码目录以访问脚本
      - ./backend:/app:delegated
      # 排除不需要同步的目录
      - /app/.venv
      - /app/__pycache__
      - /app/.pytest_cache
      - /app/**/__pycache__
    depends_on:
      - postgres
      - rustfs
    networks:
      - catwiki-network
    command: >
      sh -c "
        echo '==========================================' &&
        echo '🚀 开始初始化 CatWiki...' &&
        echo '==========================================' &&
        echo '' &&
        echo '📦 运行数据库迁移...' &&
        uv run alembic upgrade head &&
        echo '✅ 数据库迁移完成' &&
        echo '' &&
        echo ' 🔐 初始化平台管理员...' &&
        echo '✅ 平台管理员初始化完成' &&
        echo '' &&
        echo ' 初始化 Health 站点和医学知识文档...' &&
        uv run python scripts/init_health_tenant.py &&
        echo '✅ Health 数据初始化完成' &&
        echo '' &&
        echo '' &&
        echo '🗄️  初始化 RustFS 对象存储...' &&
        uv run python scripts/init_rustfs.py &&
        echo '✅ RustFS 初始化完成' &&
        echo '' &&
        echo '==========================================' &&
        echo '🎉 CatWiki 初始化完成！' &&
        echo '==========================================' &&
        echo '' &&
        echo '📋 默认管理员账号：' &&
        echo '   📧 邮箱: admin@example.com' &&
        echo '   🔑 密码: admin123' &&
        echo '' &&
        echo '📚 Health 站点：' &&
        echo '   🔗 访问: http://localhost:8002/health' &&
        echo '' &&
        echo '🔧 管理后台：' &&
        echo '   🔗 访问: http://localhost:8001' &&
        echo '' &&
        echo '📖 API 文档：' &&
        echo '   🔗 访问: http://localhost:3000/docs' &&
        echo '' &&
        echo '📚 文档站点：' &&
        echo '   🔗 访问: http://localhost:8003' &&
        echo '' &&
        echo '==========================================' &&
        echo ''
      "
    # 初始化服务只运行一次，成功后不重启
    restart: "no"
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # 后端 API 服务（支持热更新）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: catwiki-backend-dev
    container_name: catwiki-backend-dev
    env_file:
      - ./backend/.env
    environment:
      # 时区配置
      TZ: Asia/Shanghai
      
      # 数据库配置（使用服务名连接）
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      
      # RustFS 对象存储配置 (从 .env 加载，Docker 内部通信使用 RUSTFS_DOCKER_ENDPOINT)
      RUSTFS_ENDPOINT: ${RUSTFS_DOCKER_ENDPOINT:-rustfs:9000}
      
    ports:
      - "3000:3000"
    volumes:
      # 挂载代码目录以支持热更新
      - ./backend:/app:delegated
      # 排除不需要同步的目录（保留容器内的虚拟环境）
      - /app/.venv
      - /app/__pycache__
      - /app/**/__pycache__
      - /app/.git
      - /app/*.pyc
      - /app/.pytest_cache
    depends_on:
      postgres:
        condition: service_started
      rustfs:
        condition: service_started
      backend-init:
        condition: service_completed_successfully
    networks:
      - catwiki-network
    # 健康检查
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    stdin_open: true
    tty: true
    restart: unless-stopped

  # Admin 前端服务（管理后台，支持热更新）
  admin-frontend:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile.dev
    image: catwiki-admin-frontend-dev
    container_name: catwiki-admin-frontend-dev
    env_file:
      - ./frontend/admin/.env
    environment:
      - NODE_ENV=development
    ports:
      - "8001:8001"
    volumes:
      # 挂载代码目录以支持热更新
      - ./frontend/admin:/app:delegated
      - admin_node_modules:/app/node_modules
      - admin_next_cache:/app/.next
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      - backend
    networks:
      - catwiki-network
    # 资源限制（适当提高以加速 Next.js 编译）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    stdin_open: true
    tty: true
    restart: unless-stopped

  # Client 前端服务（客户端，支持热更新）
  client-frontend:
    build:
      context: ./frontend/client
      dockerfile: Dockerfile.dev
    image: catwiki-client-frontend-dev
    container_name: catwiki-client-frontend-dev
    env_file:
      - ./frontend/client/.env
    environment:
      - NODE_ENV=development
    ports:
      - "8002:8002"
    volumes:
      # 挂载代码目录以支持热更新
      - ./frontend/client:/app:delegated
      - client_node_modules:/app/node_modules
      - client_next_cache:/app/.next
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      - backend
    networks:
      - catwiki-network
    # 资源限制（适当提高以加速 Next.js 编译）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    stdin_open: true
    tty: true
    restart: unless-stopped

  # Docs 文档站点服务（VitePress，支持热更新）
  docs-frontend:
    build:
      context: ./frontend/docs
      dockerfile: Dockerfile.dev
    image: catwiki-docs-frontend-dev
    container_name: catwiki-docs-frontend-dev
    environment:
      - NODE_ENV=development
    ports:
      - "8003:8003"
    volumes:
      # 挂载代码目录以支持热更新
      - ./frontend/docs:/app:delegated
      - docs_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    networks:
      - catwiki-network
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  rustfs_data:
    driver: local
  rustfs_logs:
    driver: local
  pnpm_store:
    driver: local
  admin_node_modules:
    driver: local
  admin_next_cache:
    driver: local
  client_node_modules:
    driver: local
  client_next_cache:
    driver: local
  docs_node_modules:
    driver: local

networks:
  catwiki-network:
    driver: bridge

