# ============================================
# CatWiki Helm Chart - 全局配置
# ============================================

# -- 全局配置
global:
  # -- 时区
  timezone: Asia/Shanghai
  # -- 镜像拉取策略
  imagePullPolicy: IfNotPresent
  # -- 镜像仓库前缀 (留空则使用各服务默认值)
  imageRegistry: ""
  # -- 镜像拉取 Secret
  imagePullSecrets: []

# ============================================
# PostgreSQL 数据库
# ============================================
postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg18
  # -- 数据库名称
  database: catwiki
  # -- 数据库用户
  user: postgres
  # -- 数据库密码 (⚠️ 生产环境必须修改!)
  password: postgres
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources:
    limits:
      cpu: 800m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ============================================
# Redis 缓存
# ============================================
redis:
  enabled: true
  image:
    repository: redis
    tag: "8.4.2"
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  resources:
    limits:
      cpu: 400m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

# ============================================
# RustFS 对象存储
# ============================================
rustfs:
  enabled: true
  image:
    repository: rustfs/rustfs
    tag: 1.0.0-alpha.76
  # -- RustFS 访问密钥 (⚠️ 生产环境必须修改!)
  accessKey: rustfsadmin
  secretKey: rustfsadmin
  # -- 公网访问地址
  publicUrl: https://files.catwiki.cn
  # -- 公共存储桶
  publicBucket: true
  persistence:
    enabled: true
    dataSize: 20Gi
    logsSize: 2Gi
    storageClass: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ============================================
# 后端服务 (FastAPI)
# ============================================
backend:
  image:
    repository: bulolo/catwiki-backend
    tag: latest
  # -- 副本数
  replicaCount: 1
  # -- 环境
  environment: prod
  # -- JWT 密钥 (⚠️ 生产环境必须修改!)
  secretKey: "change-me-to-a-random-secret-key-at-least-32-chars"
  # -- CORS 允许的域名
  corsOrigins: '["https://admin.catwiki.cn","https://catwiki.cn","https://docs.catwiki.cn"]'
  # -- 数据库连接池配置
  dbPoolSize: 10
  dbMaxOverflow: 20
  dbPoolTimeout: 30
  dbPoolRecycle: 3600
  resources:
    limits:
      cpu: "1.5"
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  service:
    port: 3000

# ============================================
# 后端 Worker 服务 (ARQ)
# ============================================
worker:
  # -- 副本数
  replicaCount: 1
  resources:
    limits:
      cpu: "1.0"
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

# ============================================
# 后端初始化 (数据库迁移)
# ============================================
backendInit:
  # -- 是否启用初始化 Job
  enabled: true

# ============================================
# 管理后台前端
# ============================================
admin:
  image:
    repository: bulolo/catwiki-admin
    tag: latest
  replicaCount: 1
  # -- 构建时环境变量
  env:
    NEXT_PUBLIC_API_URL: https://api.catwiki.cn
    NEXT_PUBLIC_CLIENT_URL: https://catwiki.cn
    NEXT_PUBLIC_DOCS_URL: https://docs.catwiki.cn
    NEXT_PUBLIC_DEBUG: "false"
    NEXT_PUBLIC_SENTRY_DSN: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    port: 8001

# ============================================
# 客户端前端
# ============================================
client:
  image:
    repository: bulolo/catwiki-client
    tag: latest
  replicaCount: 1
  env:
    NEXT_PUBLIC_API_URL: https://api.catwiki.cn
    NEXT_PUBLIC_DOCS_URL: https://docs.catwiki.cn
    NEXT_PUBLIC_ADMIN_URL: https://admin.catwiki.cn
    NEXT_PUBLIC_DEBUG: "false"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    port: 8002

# ============================================
# Ingress 配置
# ============================================
ingress:
  enabled: false
  className: nginx
  annotations: {}
  # -- API 后端域名
  apiHost: api.catwiki.cn
  # -- 管理后台域名
  adminHost: admin.catwiki.cn
  # -- 客户端域名
  clientHost: catwiki.cn
  tls: []
  #  - secretName: catwiki-tls
  #    hosts:
  #      - api.catwiki.cn
  #      - admin.catwiki.cn
  #      - catwiki.cn
