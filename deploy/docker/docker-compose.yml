
services:
  # PostgreSQL 数据库
  postgres:
    image: pgvector/pgvector:pg18
    pull_policy: if_not_present
    container_name: catwiki-postgres
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      LANG: C.UTF-8
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - catwiki-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
 
  # Redis 缓存服务
  redis:
    image: redis:8.4.2
    pull_policy: if_not_present
    container_name: catwiki-redis
    command: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - catwiki-network
    restart: unless-stopped
    # 生产环境仅供内部网络访问，不映射非本地端口
    # ports:
    #   - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # RustFS 对象存储服务
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.76
    pull_policy: if_not_present
    container_name: catwiki-rustfs
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    networks:
      - catwiki-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    ports:
      - "127.0.0.1:9000:9000"

  # 后端初始化服务（生产环境）
  # 负责数据库迁移和初始化
  # 注意：生产环境建议在部署流程中单独执行，而不是每次部署都运行
  backend-init:
    image: bulolo/catwiki-backend:${DOCKER_IMAGE_TAG:-v1.0.8}
    pull_policy: always
    container_name: catwiki-backend-init
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - catwiki-network
    command: >
      sh -c "
        echo '==========================================' &&
        echo '🚀 开始初始化 CatWiki 生产环境...' &&
        echo '==========================================' &&
        echo '' &&
        echo '📦 运行数据库迁移...' &&
        uv run --no-sync alembic upgrade head &&
        echo '✅ 数据库迁移完成' &&
        echo '' &&
        echo '🔧 执行系统资源初始化 (知识库 / 对象存储)...' &&
        uv run --no-sync python scripts/init.py &&
        echo '' &&
        echo '==========================================' &&
        echo '🎉 CatWiki 生产环境初始化完成！' &&
        echo '==========================================' &&
        echo '' &&
        echo '📋 默认账号请查看登录页面提示' &&
        echo '' &&
        echo '==========================================' &&
        echo ''
      "
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # FastAPI 后端服务
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    image: bulolo/catwiki-backend:${DOCKER_IMAGE_TAG:-v1.0.8}
    pull_policy: always
    container_name: catwiki-backend
    env_file:
      - .env
    depends_on:
      backend-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - catwiki-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3000}:3000"

  # 后端 Worker 服务 (处理异步任务)
  worker:
    image: bulolo/catwiki-backend:${DOCKER_IMAGE_TAG:-v1.0.8}
    container_name: catwiki-worker
    env_file:
      - .env
    depends_on:
      backend-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - catwiki-network
    restart: unless-stopped
    command: uv run --no-sync arq app.core.queue.worker_config.WorkerSettings
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f arq || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # 管理后台前端
  admin-frontend:
    build:
      context: ../../frontend/admin
      dockerfile: Dockerfile.prod
    image: bulolo/catwiki-admin:${DOCKER_IMAGE_TAG:-v1.0.8}
    pull_policy: always
    container_name: catwiki-admin
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      # ⚠️ 生产环境需改为实际后端域名，如 https://api.yourdomain.com
      # 浏览器无法访问容器内的 localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_CLIENT_URL: http://localhost:8002
      NEXT_PUBLIC_DOCS_URL: http://localhost:8003
      NEXT_PUBLIC_DEBUG: false
      NEXT_PUBLIC_SENTRY_DSN: ""
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - catwiki-network
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "127.0.0.1:${ADMIN_PORT:-8001}:8001"

  # 客户端前端
  client-frontend:
    build:
      context: ../../frontend/client
      dockerfile: Dockerfile.prod
    image: bulolo/catwiki-client:${DOCKER_IMAGE_TAG:-v1.0.8}
    pull_policy: always
    container_name: catwiki-client
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      # ⚠️ 生产环境需改为实际后端域名
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_DOCS_URL: http://localhost:8003
      NEXT_PUBLIC_ADMIN_URL: http://localhost:8001
      NEXT_PUBLIC_DEBUG: false
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - catwiki-network
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "127.0.0.1:${CLIENT_PORT:-8002}:8002"


networks:
  catwiki-network:
    name: catwiki-network
    driver: bridge

volumes:
  postgres_data:
    driver: local
  rustfs_data:
    driver: local
  rustfs_logs:
    driver: local
  redis_data:
    driver: local
