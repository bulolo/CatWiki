# ==============================================================================
# CatWiki Nginx 生产环境主配置文件 (优化版)
# ==============================================================================

# 1. 全局基础配置
# ------------------------------------------------------------------------------
# 通用代理头
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Port $server_port;

# 安全响应头
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Gzip 压缩优化
gzip on;
gzip_proxied any;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_comp_level 6;

# 2. 统一 HTTP (80) 强制跳转 HTTPS
# ------------------------------------------------------------------------------
server {
    listen 80;
    server_name catwiki.ai www.catwiki.ai docs.catwiki.cn catwiki.cn www.catwiki.cn admin.catwiki.cn api.catwiki.cn files.catwiki.cn;
    return 301 https://$host$request_uri;
}

# 3. SSL 共享配置模板 (通常在 nginx.conf 中定义，这里为了演示直接写在 block 中)
# ------------------------------------------------------------------------------
# 如果是多个 server 共用证书，建议抽取。这里假设各子域名共用通配符证书。

# 4. 各服务配置块
# ------------------------------------------------------------------------------

# [Admin Dashboard]
server {
    listen 443 ssl;
    server_name admin.catwiki.cn;

    ssl_certificate     /etc/nginx/ssl/catwiki_cn.pem; # 需替换为实际证书路径
    ssl_certificate_key /etc/nginx/ssl/catwiki_cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8001;
    }
}

# [Client App / Main]
server {
    listen 443 ssl;
    server_name catwiki.cn www.catwiki.cn;

    ssl_certificate     /etc/nginx/ssl/catwiki_cn.pem;
    ssl_certificate_key /etc/nginx/ssl/catwiki_cn.key;

    # AI 流式透传优化：防止 Nginx 缓冲前端代理的响应
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass http://127.0.0.1:8002;
    }
}

# [Main Site / Landing]
server {
    listen 443 ssl;
    server_name catwiki.ai www.catwiki.ai;

    ssl_certificate     /etc/nginx/ssl/catwiki_ai.pem;
    ssl_certificate_key /etc/nginx/ssl/catwiki_ai.key;

    location / {
        proxy_pass http://127.0.0.1:8004;
    }
}

# [Documentation]
server {
    listen 443 ssl;
    server_name docs.catwiki.cn;

    ssl_certificate     /etc/nginx/ssl/catwiki_cn.pem;
    ssl_certificate_key /etc/nginx/ssl/catwiki_cn.key;

    location / {
        proxy_pass http://127.0.0.1:8003;
    }
}

# [Backend API]
server {
    listen 443 ssl;
    server_name api.catwiki.cn;

    ssl_certificate     /etc/nginx/ssl/catwiki_cn.pem;
    ssl_certificate_key /etc/nginx/ssl/catwiki_cn.key;

    # AI 生成长连接响应优化
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    
    # 对 API 响应禁用缓冲，支持 SSE (Server-Sent Events)
    proxy_buffering off;
    proxy_cache off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    chunked_transfer_encoding off;
    tcp_nodelay on;

    location / {
        proxy_pass http://127.0.0.1:3000;
        
        # 兼容旧配置中的遥测包含 (如有)
        # include /home/docker/catWiki/telemetry-backend/nginx/telemetry.conf;
    }
}

# [OSS / RustFS Storage]
server {
    listen 443 ssl;
    server_name files.catwiki.cn;

    ssl_certificate     /etc/nginx/ssl/catwiki_cn.pem;
    ssl_certificate_key /etc/nginx/ssl/catwiki_cn.key;

    # 允许上传 100MB 以内的文件
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:9000;
        
        # 存储专属优化：完全禁用缓冲以提升大文件吞吐，并减少本地磁盘 IO
        proxy_buffering off;
        proxy_request_buffering off;
        
        # 超时设置
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
